<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CardioIA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div>
        <h1>❤️ CardioIA</h1>
        <p class="subtitle">Assistente Cardiológico Conversacional</p>
      </div>

      <button id="newChatBtn" class="secondary-btn">+ Nova conversa</button>

      <div class="info-box">
        <strong>Status:</strong>
        <span id="statusText">Conectando...</span>
      </div>

      <div class="info-box warning">
        <strong>Atenção:</strong>
        <p>
          Este assistente fornece apenas orientações iniciais e não substitui
          avaliação médica profissional.
        </p>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2>Atendimento inicial em saúde</h2>
          <p>Converse com o assistente para informações gerais e agendamento.</p>
        </div>
      </header>

      <section id="chat" class="chat"></section>

      <form id="form" class="input-area">
        <input
          type="text"
          id="input"
          placeholder="Digite sua mensagem..."
          autocomplete="off"
        />
        <button type="submit" class="primary-btn">Enviar</button>
      </form>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
